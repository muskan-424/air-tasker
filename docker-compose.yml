# Local / demo stack: PostgreSQL + FastAPI API
# From repo root:
#   docker compose up --build
# API: http://localhost:4000  - health: GET /api/health
#
# Optional Redis (cache + notification fanout):
#   docker compose --profile cache up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airtasker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airtasker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    profiles: [cache]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    env_file:
      - ./backend_fastapi/.env.docker.example
    ports:
      - "4000:4000"
    # For optional Redis, set REDIS_URL in backend_fastapi/.env.docker.example
    environment: {}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/api/health', timeout=3).getcode()==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
